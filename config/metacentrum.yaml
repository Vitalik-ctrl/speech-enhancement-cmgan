system:
  root: "/storage/projects/CTU_Speech_Lab"
  scratch: "/storage/projects/CTU_Speech_Lab/scratch/varhavit"
  workspace: "/storage/projects/CTU_Speech_Lab/workspace/varhavit"

paths:
  sph2pipe: "tools/sph2pipe/sph2pipe"
  clean_data:
    - "data/WSJ/wsj1/si_tr_s"
    - "data2/timit/timit/train/dr1"
    - "data/CtuTest/SHORT/"
  noise_data:
    - "data/additive_noises/QUT_NOISES/CAFE_FOODCOURTB_1"
    - "data/additive_noises/QUT_NOISES/HOME_KITCHEN_1"
    - "data/additive_noises/QUT_NOISES/CAFE_CAFE_1"
    - "data/additive_noises/QUT_NOISES/CAR_WINCLOSED_1"
    - "data/additive_noises/QUT_NOISES/REVERB_CARPARK_1"
    - "data/additive_noises/QUT_NOISES/REVERB_POOL_1"
    - "data/additive_noises/QUT_NOISES/STREET_CITY_1"
    - "data/additive_noises/QUT_NOISES/STREET_KG_1"
    - "data/additive_noises/QUT_NOISES/CAR_WINUPB_1"
    - "data/additive_noises/QUT_NOISES/CAFE_CAFE_2"
    - "data/additive_noises/QUT_NOISES/CAFE_FOODCOURTB_2"
    - "data/additive_noises/QUT_NOISES/CAR_WINDOWNB_2"
    - "data/additive_noises/QUT_NOISES/CAR_WINUPB_2"
    - "data/additive_noises/QUT_NOISES/HOME_KITCHEN_2"
    - "data/additive_noises/QUT_NOISES/HOME_LIVINGB_2"
    - "data/additive_noises/QUT_NOISES/REVERB_CARPARK_2"
    - "data/additive_noises/QUT_NOISES/REVERB_POOL_2"
    - "data/additive_noises/QUT_NOISES/STREET_CITY_2"
    - "data/additive_noises/QUT_NOISES/STREET_KG_2"
  ir_data:
    - "data/convolutional_noises"
  manifest_dir: "manifest"
  train_manifest: "manifest/train_manifest_wsj07_03_2026.csv"
  eval_manifest: "manifest/eval_manifest_wsj07_03_2026.csv"
  dnsmos_model: "models/dnsmos_model.onnx"
  save_dir: "/auto/projects-du-praha/CTU_Speech_Lab/workspace/varhavit/speech-enhancement-cmgan/checkpoints"

audio:
  sample_rate: 16000
  n_fft: 400
  hop_length: 100
  segment_seconds: 2.0
  target_snr: [-5, 0, 5, 10, 15, 20, 30, 40]

training:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  loss_weights: [0.1, 0.9, 0.2, 0.05]
  epochs: 120
  decay_epoch: 30
  init_lr: 5e-4

model:
  num_channel: 128

evaluation:
  batch_limit: 5
